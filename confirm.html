<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예약 확인 | 뚝딱거리는 커피테이블</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <p class="event-label">2026. 4. 26 SUN</p>
      <h1>뚝딱거리는 커피테이블</h1>
      <p class="subtitle" style="margin-bottom: 24px">예약 확인 / 취소</p>
    </header>

    <!-- ① 전화번호 뒷 4자리 입력 -->
    <section id="step-lookup" class="step active">
      <h2>예약 확인</h2>
      <div class="form-group">
        <label for="phone4">전화번호 뒷 4자리</label>
        <input type="tel" id="phone4" placeholder="0000" maxlength="4" inputmode="numeric">
      </div>
      <button class="btn-primary" onclick="lookupReservation()">확인하기</button>
      <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted);line-height:1.6">
        예약 내역이 없다면 인스타 DM으로 문의해 주세요.<br>
        <strong>@jeho______</strong> 또는 <strong>@k.sipster</strong>
      </p>
      <p style="text-align:center;margin-top:12px">
        <a href="index.html" style="color:var(--muted);font-size:14px">← 예약 페이지로 돌아가기</a>
      </p>
    </section>

    <!-- ② 예약 내역 표시 -->
    <section id="step-info" class="step">
      <h2>예약 내역</h2>
      <div class="reservation-card" id="confirm-card"></div>
      <button class="btn-primary" style="background:var(--coral);margin-top:8px" onclick="showStep('step-confirm')">
        예약 취소하기
      </button>
      <p style="text-align:center;margin-top:12px">
        <a href="index.html" style="color:var(--muted);font-size:14px">← 돌아가기</a>
      </p>
    </section>

    <!-- ③ 취소 확인 -->
    <section id="step-confirm" class="step">
      <div class="error-icon" style="font-size:22px">?</div>
      <h2>정말 취소하시겠어요?</h2>
      <p style="text-align:center;color:var(--muted);font-size:14px;margin:12px 0 28px;line-height:1.7">
        취소 후에는 되돌릴 수 없습니다.<br>재예약은 예약 페이지에서 가능합니다.
      </p>
      <div class="btn-row" style="grid-template-columns:1fr 1fr">
        <button class="btn-secondary" onclick="showStep('step-info')">아니요, 돌아갈게요</button>
        <button class="btn-primary" style="background:var(--coral)" onclick="submitCancel()">네, 취소할게요</button>
      </div>
    </section>

    <!-- ④ 취소 완료 -->
    <section id="step-done" class="step">
      <div class="success-icon" style="background:var(--coral)">✓</div>
      <h2>취소 완료</h2>
      <p id="done-msg" style="text-align:center;color:var(--muted);margin-top:8px;font-size:15px"></p>
      <a href="index.html" class="btn-primary" style="display:block;text-align:center;margin-top:24px;text-decoration:none">
        다시 예약하기
      </a>
    </section>

    <!-- 에러 -->
    <section id="step-error" class="step">
      <div class="error-icon">!</div>
      <h2 id="error-title">오류가 발생했습니다</h2>
      <p id="error-msg" style="text-align:center;color:var(--muted);margin-top:8px"></p>
      <button class="btn-primary" onclick="showStep('step-lookup')" style="margin-top:24px">
        다시 시도하기
      </button>
    </section>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby7qgj93LtLd7pMIxugiZoekiEK9byrQR2l1eLAfbmIzztETXk5BhhWwxrOcb7ulQ5dww/exec';

    let reservationData = null; // { code, name, phone, time, guests }

    // 숫자만 허용
    document.getElementById('phone4').addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '').slice(0, 4);
    });

    function showStep(id) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ① 조회
    async function lookupReservation() {
      const phone4 = document.getElementById('phone4').value.trim();
      if (phone4.length !== 4) { alert('전화번호 뒷 4자리를 입력해 주세요.'); return; }

      const btn = document.querySelector('#step-lookup .btn-primary');
      btn.textContent = '조회 중...';
      btn.disabled = true;

      try {
        const res = await fetch(`${GAS_URL}?action=confirm&phone4=${phone4}`);
        const data = await res.json();

        if (data.success) {
          reservationData = data;
          document.getElementById('confirm-card').innerHTML = `
            <div class="row"><span>이름</span><span>${data.name}</span></div>
            <div class="row"><span>시간</span><span>${data.time}</span></div>
            <div class="row"><span>인원</span><span>${data.guests}명</span></div>
            <div class="row"><span>상태</span><span style="color:var(--success);font-weight:600">예약완료</span></div>
          `;
          showStep('step-info');
        } else {
          document.getElementById('error-title').textContent = '예약 내역 없음';
          document.getElementById('error-msg').textContent = data.message || '예약 내역을 찾을 수 없습니다.';
          showStep('step-error');
        }
      } catch {
        document.getElementById('error-title').textContent = '오류가 발생했습니다';
        document.getElementById('error-msg').textContent = '네트워크 오류입니다. 잠시 후 다시 시도해 주세요.';
        showStep('step-error');
      } finally {
        btn.textContent = '확인하기';
        btn.disabled = false;
      }
    }

    // ③ 취소 실행
    async function submitCancel() {
      if (!reservationData) return;

      const btn = document.querySelector('#step-confirm .btn-primary');
      btn.textContent = '취소 중...';
      btn.disabled = true;

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'cancel',
            code:  reservationData.code,
            phone: reservationData.phone
          })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('done-msg').textContent =
            `${reservationData.time} 예약이 취소되었습니다.`;
          showStep('step-done');
        } else {
          document.getElementById('error-title').textContent = '취소 실패';
          document.getElementById('error-msg').textContent = data.message || '취소에 실패했습니다.';
          showStep('step-error');
        }
      } catch {
        document.getElementById('error-title').textContent = '오류가 발생했습니다';
        document.getElementById('error-msg').textContent = '네트워크 오류입니다. 잠시 후 다시 시도해 주세요.';
        showStep('step-error');
      } finally {
        btn.textContent = '네, 취소할게요';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
